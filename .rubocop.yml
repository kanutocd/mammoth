plugins:
  - rubocop-minitest
  - rubocop-rake
  
AllCops:
  TargetRubyVersion: 4.0

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Metrics/MethodLength:
  Max: 19

Metrics/ClassLength:
  Max: 145

Metrics/AbcSize: 
  Max: 25

Metrics/ParameterLists:
  CountKeywordArgs: false    # Excludes keyword arguments from the total count

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 10

Layout/LineLength:
  Max: 130
