name: Release Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release source
        env:
          RELEASE_BRANCH: release
        run: |
          release_ref="origin/${RELEASE_BRANCH}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF}" != "refs/heads/${RELEASE_BRANCH}" ]; then
              echo "Manual Docker releases must be run from the ${RELEASE_BRANCH} branch."
              exit 1
            fi
            exit 0
          fi

          if ! git show-ref --verify --quiet "refs/remotes/${release_ref}"; then
            echo "Release branch ${release_ref} was not fetched."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "${release_ref}"; then
            echo "Release tag commit ${GITHUB_SHA} is not reachable from ${release_ref}."
            exit 1
          fi

      - name: Check tag matches gem version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(ruby -Ilib -rmammoth/version -e 'puts Mammoth::VERSION')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match gem version $version"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kanutocd/mammoth
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}