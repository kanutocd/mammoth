name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "lib/**"
      - "README.md"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "LICENSE.txt"
      - ".yardopts"
      - "scripts/install_docs_branding.rb"
      - "Gemfile"
      - "Gemfile.lock"
      - "mammoth.gemspec"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Build YARD documentation
        run: bundle exec yard doc --no-private --output-dir public

      - name: Install documentation branding
        run: ruby scripts/install_docs_branding.rb public

      - name: Verify documentation output
        run: |
          test -f public/index.html
          test -f public/file.README.html
          test -f public/favicon.ico
          test -f public/mammoth-social-preview-1280x640.png
          test -f public/mammoth-primary-horizontal-light.png
          grep -q 'property="og:image"' public/index.html
          grep -q 'name="twitter:card"' public/index.html
          grep -q 'srcset="mammoth-primary-horizontal-light.png"' public/index.html
          ! grep -q 'mammoth-primary-horizontal-reversed-transparent.png' public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy documentation
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
