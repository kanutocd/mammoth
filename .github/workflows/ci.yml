name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Test, lint, docs, package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mammoth_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mammoth_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install native extension headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Run tests with coverage gates
        run: bundle exec rake

      - name: Enable PostgreSQL logical replication
        run: |
          docker exec "${{ job.services.postgres.id }}" psql -U postgres -d mammoth_e2e -c "ALTER SYSTEM SET wal_level = 'logical'"
          docker restart "${{ job.services.postgres.id }}"
          until docker exec "${{ job.services.postgres.id }}" pg_isready -U postgres -d mammoth_e2e; do sleep 1; done

      - name: Run E2E tests
        run: bundle exec rake test:e2e
        env:
          MAMMOTH_E2E_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/mammoth_e2e
