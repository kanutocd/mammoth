name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Ruby dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Install Bundler Audit
        run: gem install bundler-audit --version 0.9.2 --no-document

      - name: Audit Ruby dependencies
        run: bundler-audit check --update

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ruby

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  container-audit:
    name: Container vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build container
        run: docker build -t mammoth:security-scan -f docker/Dockerfile .

      - name: Scan container
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: mammoth:security-scan
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"
