name: Release Ruby Gem

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release gem to RubyGems.org
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://rubygems.org/gems/mammoth
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake
      - name: Release gem to RubyGems.org
        uses: rubygems/release-gem@v1
