services:
  postgres14:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mammoth_e2e
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    ports:
      - "55414:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mammoth_e2e"]
      interval: 2s
      timeout: 3s
      retries: 30

