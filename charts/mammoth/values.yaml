image:
  repository: ghcr.io/kanutocd/mammoth
  tag: "1.2.0"
  pullPolicy: IfNotPresent

# Private PRO images can be used by overriding image.repository and setting
# imagePullSecrets to a Kubernetes registry secret.
imagePullSecrets: []
# - name: kanutocd-pro-registry

mammoth:
  name: production_mammoth

node:
  node_id: ""
  node_name: ""
  fleet_id: ""
  environment: ""
  labels: {}
  metadata: {}

postgres:
  host: "postgres-service.internal"
  port: 5432
  database: "app_production"
  username: "mammoth_user"
  existingSecret:
    name: "postgres-secrets"
    key: "password"

replication:
  slot: "mammoth_prod"
  publications:
    - "mammoth_publication"
  auto_create_slot: true
  temporary_slot: false
  feedback_interval: 7.0

delivery:
  unit: "transaction"
  ordering:
    scope: "transaction"

runtime:
  adapter: "concurrent"
  concurrency: 1
  batch_size: 1
  preserve_order: true
  timeout_seconds: null

webhook:
  name: "primary_webhook"
  url: "https://yourservice.com/webhooks/postgres"
  timeout_seconds: 5
  headers: {}
  header_env: {}
  # Example:
  # header_env:
  #   Authorization: MAMMOTH_WEBHOOK_AUTHORIZATION
  signing: {}
  # Example:
  # signing:
  #   algorithm: hmac_sha256
  #   secret_env: MAMMOTH_WEBHOOK_SIGNING_SECRET
  #   signature_header: X-Mammoth-Signature
  #   timestamp_header: X-Mammoth-Timestamp
  existingSecret:
    name: ""
    # Map environment variable names used by webhook.header_env and webhook.signing.secret_env
    # to keys in this Secret.
    keys: {}
    # Example:
    # keys:
    #   MAMMOTH_WEBHOOK_AUTHORIZATION: authorization
    #   MAMMOTH_WEBHOOK_SIGNING_SECRET: signing-secret

# Optional fanout destination list. When set, this replaces the single webhook
# shorthand above in the rendered Mammoth configuration.
destinations: []
# Example:
# destinations:
#   - name: "primary_webhook"
#     type: "webhook"
#     enabled: true
#     url: "https://yourservice.com/webhooks/postgres"
#     timeout_seconds: 5
#     headers: {}
#     header_env:
#       Authorization: MAMMOTH_PRIMARY_WEBHOOK_AUTHORIZATION
#     signing:
#       algorithm: hmac_sha256
#       secret_env: MAMMOTH_PRIMARY_WEBHOOK_SIGNING_SECRET
#     existingSecret:
#       name: "primary-webhook-secrets"
#       keys:
#         MAMMOTH_PRIMARY_WEBHOOK_AUTHORIZATION: authorization
#         MAMMOTH_PRIMARY_WEBHOOK_SIGNING_SECRET: signing-secret
#   - name: "audit_webhook"
#     type: "webhook"
#     enabled: true
#     url: "https://audit.example.com/cdc"
#     timeout_seconds: 5
#     route:
#       schemas:
#         - "public"
#       tables:
#         - "orders"
#       operations:
#         - "insert"
#         - "update"
#     retry:
#       max_attempts: 3
#       schedule_seconds:
#         - 1
#         - 10

retry:
  max_attempts: 5
  schedule_seconds:
    - 1
    - 5
    - 30
    - 60
    - 300

operational_state:
  adapter: "sqlite"

logging:
  level: "info"

persistence:
  existingClaim: ""
  storage: "1Gi"
  # storageClass: "gp3"

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

# PRO-only values are intentionally not rendered by the OSS chart templates.
pro: {}
