apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mammoth.fullname" . }}-config
  labels:
    {{- include "mammoth.labels" . | nindent 4 }}
data:
  mammoth.config.yaml: |
    mammoth:
      name: {{ .Values.mammoth.name | default (include "mammoth.fullname" .) }}

    postgres:
      host: {{ .Values.postgres.host | quote }}
      port: {{ .Values.postgres.port | default 5432 }}
      database: {{ .Values.postgres.database | quote }}
      username: {{ .Values.postgres.username | quote }}
      password_env: "MAMMOTH_POSTGRES_PASSWORD"

    replication:
      slot: {{ .Values.replication.slot | quote }}
      publications:
        {{ toYaml .Values.replication.publications | nindent 8 }}
      auto_create_slot: {{ .Values.replication.auto_create_slot | default true }}
      temporary_slot: {{ .Values.replication.temporary_slot | default false }}
      feedback_interval: {{ .Values.replication.feedback_interval | default 5.0 }}

    delivery:
      unit: {{ .Values.delivery.unit | default "transaction" | quote }}
      ordering:
        scope: {{ .Values.delivery.ordering.scope | default "transaction" | quote }}

    runtime:
      adapter: {{ .Values.runtime.adapter | default "concurrent" | quote }}
      concurrency: {{ .Values.runtime.concurrency | default 1 }}
      batch_size: {{ .Values.runtime.batch_size | default 1 }}
      preserve_order: {{ .Values.runtime.preserve_order | default true }}
      timeout_seconds: {{ .Values.runtime.timeout_seconds | default "null" }}

    {{- if .Values.destinations }}
    destinations:
      {{- range .Values.destinations }}
      - name: {{ .name | quote }}
        type: {{ .type | default "webhook" | quote }}
        enabled: {{- if hasKey . "enabled" }} {{ .enabled }}{{- else }} true{{- end }}
        url: {{ .url | quote }}
        timeout_seconds: {{ .timeout_seconds | default 5 }}
        {{- with .headers }}
        headers:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .header_env }}
        header_env:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .signing }}
        signing:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .route }}
        route:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .retry }}
        retry:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
    {{- else }}
    webhook:
      name: {{ .Values.webhook.name | quote }}
      url: {{ .Values.webhook.url | quote }}
      timeout_seconds: {{ .Values.webhook.timeout_seconds | default 5 }}
      {{- with .Values.webhook.headers }}
      headers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhook.header_env }}
      header_env:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhook.signing }}
      signing:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}

    retry:
      max_attempts: {{ .Values.retry.max_attempts | default 5 }}
      schedule_seconds:
        {{- toYaml .Values.retry.schedule_seconds | nindent 8 }}

    sqlite:
      path: "/data/mammoth.db"

    logging:
      level: {{ .Values.logging.level | default "info" | quote }}
