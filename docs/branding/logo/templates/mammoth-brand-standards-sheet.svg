<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Mammoth brand standards sheet</title>
  <desc id="desc">Frozen mark, lockups, colors, typography, and minimum-size guidance.</desc>
  <rect width="1800" height="1200" fill="#FFFFFF"/>
  <text x="100" y="110" fill="#0F0F0F" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="62" font-weight="900">MAMMOTH · FROZEN MARK</text>
  <text x="100" y="160" fill="#64748B" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="25" font-weight="600" letter-spacing="3">NO-NONSENSE · STRONG · FOCUSED · SERIOUS</text>
  <path d="M100 205H1700" stroke="#E8EBEF" stroke-width="4"/>

  <image href="../exports/png/mammoth-icon-black-transparent-2048.png" x="80" y="245" width="620" height="620"/>
  <rect x="750" y="270" width="420" height="420" rx="38" fill="#0F0F0F"/>
  <image href="../exports/png/mammoth-icon-white-transparent-2048.png" x="785" y="305" width="350" height="350"/>
  <rect x="1220" y="270" width="420" height="420" rx="38" fill="#F7F8FA" stroke="#E8EBEF" stroke-width="3"/>
  <image href="../exports/png/mammoth-icon-postgres-blue-transparent-2048.png" x="1255" y="305" width="350" height="350"/>

  <text x="770" y="750" fill="#0F0F0F" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="27" font-weight="800">PRIMARY REVERSED</text>
  <text x="1240" y="750" fill="#0F0F0F" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="27" font-weight="800">POSTGRESQL CONTEXT</text>

  <text x="100" y="920" fill="#0F0F0F" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="34" font-weight="900">COLORS</text>
  <g transform="translate(100 960)">
    <rect width="80" height="80" rx="16" fill="#0F0F0F"/>
    <rect x="110" width="80" height="80" rx="16" fill="#336791"/>
    <rect x="220" width="80" height="80" rx="16" fill="#5BA0E6"/>
    <rect x="330" width="80" height="80" rx="16" fill="#64748B"/>
    <rect x="440" width="80" height="80" rx="16" fill="#E8EBEF"/>
  </g>
  <text x="100" y="1085" fill="#64748B" font-family="JetBrains Mono, IBM Plex Mono, monospace" font-size="20">#0F0F0F   #336791   #5BA0E6   #64748B   #E8EBEF</text>

  <text x="750" y="920" fill="#0F0F0F" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="34" font-weight="900">TYPE</text>
  <text x="750" y="992" fill="#0F0F0F" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="64" font-weight="900">Inter Black</text>
  <text x="750" y="1040" fill="#64748B" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="25">Inter Regular · JetBrains Mono</text>

  <text x="1280" y="920" fill="#0F0F0F" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="34" font-weight="900">USAGE</text>
  <text x="1280" y="977" fill="#64748B" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="24">Clear space: ¼ mark height</text>
  <text x="1280" y="1018" fill="#64748B" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="24">Minimum digital size: 24 px</text>
  <text x="1280" y="1059" fill="#64748B" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="24">Primary: black or reversed white</text>
  <text x="100" y="1160" fill="#64748B" font-family="Inter, Geist, Noto Sans, Arial, sans-serif" font-size="23">Carry Every Transaction. · PostgreSQL CDC Data Plane</text>
</svg>
