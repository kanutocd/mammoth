# yaml-language-server: $schema=../../../config/mammoth.schema.json

mammoth:
  name: fanout_mammoth

postgres:
  host: postgres
  port: 5432
  database: mammoth_demo
  username: mammoth
  password_env: MAMMOTH_POSTGRES_PASSWORD

replication:
  slot: mammoth_fanout
  publications:
    - mammoth_publication
  auto_create_slot: true
  temporary_slot: false
  feedback_interval: 2.0

delivery:
  unit: transaction
  ordering:
    scope: transaction

runtime:
  adapter: concurrent
  concurrency: 4
  batch_size: 1
  preserve_order: true
  timeout_seconds:

destinations:
  - name: primary_webhook
    type: webhook
    url: https://example.com/webhooks/postgres
    timeout_seconds: 5
    header_env:
      Authorization: MAMMOTH_PRIMARY_WEBHOOK_AUTHORIZATION
    signing:
      algorithm: hmac_sha256
      secret_env: MAMMOTH_PRIMARY_WEBHOOK_SIGNING_SECRET
      signature_header: X-Mammoth-Signature
      timestamp_header: X-Mammoth-Timestamp

  - name: audit_webhook
    type: webhook
    url: https://audit.example.com/cdc
    timeout_seconds: 5
    headers:
      X-Mammoth-Route: audit

retry:
  max_attempts: 5
  schedule_seconds:
    - 1
    - 5
    - 30
    - 60
    - 300

sqlite:
  path: .sqlite3/mammoth.db

logging:
  level: info
