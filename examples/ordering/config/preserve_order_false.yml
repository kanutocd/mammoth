# yaml-language-server: $schema=../../../config/mammoth.schema.json

mammoth:
  name: ordering_mammoth_false

postgres:
  host: postgres
  port: 5432
  database: mammoth_demo
  username: mammoth
  password_env: MAMMOTH_POSTGRES_PASSWORD

replication:
  slot: mammoth_ordering_false
  publications:
    - mammoth_publication
  auto_create_slot: true
  temporary_slot: false
  feedback_interval: 2.0

delivery:
  unit: transaction
  ordering:
    scope: transaction

runtime:
  adapter: concurrent
  concurrency: 25
  batch_size: 3
  preserve_order: false
  timeout_seconds:

webhook:
  name: ordering_webhook
  url: http://webhook_receiver:9292/webhook
  timeout_seconds: 5

retry:
  max_attempts: 5
  schedule_seconds:
    - 1
    - 5
    - 30
    - 60
    - 300

sqlite:
  path: .sqlite3/mammoth.db

logging:
  level: info
