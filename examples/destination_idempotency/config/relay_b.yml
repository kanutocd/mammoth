# yaml-language-server: $schema=../../../config/mammoth.schema.json

mammoth:
  name: idempotency_relay_b

postgres:
  host: postgres
  port: 5432
  database: mammoth_demo
  username: mammoth
  password_env: MAMMOTH_POSTGRES_PASSWORD

replication:
  slot: mammoth_idempotency
  publications:
    - mammoth_publication
  auto_create_slot: false
  temporary_slot: false

webhook:
  name: orders_api
  url: http://webhook_receiver:9292/webhook
  timeout_seconds: 5

retry:
  max_attempts: 3
  schedule_seconds:
    - 1
    - 2
    - 5

sqlite:
  path: .sqlite3/relay_b.db

logging:
  level: info
