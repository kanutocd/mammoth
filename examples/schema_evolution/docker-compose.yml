services:
  postgres:
    image: postgres:17
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          psql -U mammoth -d mammoth_demo
          -tAc "SELECT 1 FROM pg_publication WHERE pubname = 'mammoth_publication'"
          | grep -qx 1
      interval: 2s
      timeout: 5s
      retries: 30
    environment:
      POSTGRES_DB: mammoth_demo
      POSTGRES_USER: mammoth
      POSTGRES_PASSWORD: mammoth
    command:
      - postgres
      - -c
      - wal_level=logical
    ports:
      - "54337:5432"
    volumes:
      - schema_evolution_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  webhook_receiver:
    image: ruby:4.0-slim
    working_dir: /app
    command:
      - sh
      - -c
      - |
        gem install webrick --no-document
        ruby /app/webhook_receiver.rb
    ports:
      - "9300:9292"
    volumes:
      - ./receiver:/app:ro

  mammoth:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    environment:
      MAMMOTH_CONFIG: /config/mammoth.yml
      MAMMOTH_POSTGRES_PASSWORD: mammoth
    volumes:
      - ./config/mammoth.yml:/config/mammoth.yml:ro
      - schema_evolution_mammoth_data:/app/.sqlite3
    depends_on:
      postgres:
        condition: service_healthy
      webhook_receiver:
        condition: service_started

  producer_v1:
    image: postgres:17
    profiles: ["producer"]
    environment:
      PGPASSWORD: mammoth
    depends_on:
      postgres:
        condition: service_healthy
      mammoth:
        condition: service_started
    command:
      - psql
      - -h
      - postgres
      - -U
      - mammoth
      - -d
      - mammoth_demo
      - -v
      - ON_ERROR_STOP=1
      - -f
      - /producer/v1.sql
    volumes:
      - ./producer/v1.sql:/producer/v1.sql:ro

  migrate:
    image: postgres:17
    profiles: ["operator"]
    environment:
      PGPASSWORD: mammoth
    depends_on:
      postgres:
        condition: service_healthy
      mammoth:
        condition: service_started
    command:
      - psql
      - -h
      - postgres
      - -U
      - mammoth
      - -d
      - mammoth_demo
      - -v
      - ON_ERROR_STOP=1
      - -f
      - /migration/add_currency.sql
    volumes:
      - ./migration/add_currency.sql:/migration/add_currency.sql:ro

  producer_v2:
    image: postgres:17
    profiles: ["producer"]
    environment:
      PGPASSWORD: mammoth
    depends_on:
      postgres:
        condition: service_healthy
      mammoth:
        condition: service_started
    command:
      - psql
      - -h
      - postgres
      - -U
      - mammoth
      - -d
      - mammoth_demo
      - -v
      - ON_ERROR_STOP=1
      - -f
      - /producer/v2.sql
    volumes:
      - ./producer/v2.sql:/producer/v2.sql:ro

volumes:
  schema_evolution_postgres_data:
  schema_evolution_mammoth_data:
