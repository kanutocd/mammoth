# yaml-language-server: $schema=../../../config/mammoth.schema.json

mammoth:
  name: operational_state_demo

postgres:
  host: localhost
  port: 5432
  database: mammoth_demo
  username: mammoth
  password_env: MAMMOTH_POSTGRES_PASSWORD

replication:
  slot: mammoth_state_demo
  publications:
    - mammoth_publication
  auto_create_slot: false
  temporary_slot: false
  feedback_interval: 10.0

webhook:
  name: primary_webhook
  url: http://localhost:9292/webhook
  timeout_seconds: 5

retry:
  max_attempts: 5
  schedule_seconds:
    - 1
    - 5
    - 30
    - 60
    - 300

sqlite:
  path: examples/operational_state/.sqlite3/mammoth.db

logging:
  level: info
