services:
  postgres:
    image: postgres:17
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mammoth -d mammoth_demo"]
      interval: 2s
      timeout: 5s
      retries: 30
    environment:
      POSTGRES_DB: mammoth_demo
      POSTGRES_USER: mammoth
      POSTGRES_PASSWORD: mammoth
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_slot_wal_keep_size=1MB
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "54335:5432"
    volumes:
      - slot_invalidation_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro

  webhook_receiver:
    image: ruby:4.0-slim
    working_dir: /app
    command:
      - sh
      - -c
      - |
        gem install webrick --no-document
        ruby /app/webhook_receiver.rb
    ports:
      - "9298:9292"
    environment:
      RECEIVER_DATA_DIR: /data
    volumes:
      - ./receiver:/app:ro
      - slot_invalidation_receiver_data:/data

  mammoth:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    environment:
      MAMMOTH_CONFIG: /config/mammoth.yml
      MAMMOTH_POSTGRES_PASSWORD: mammoth
    volumes:
      - ./config/mammoth.yml:/config/mammoth.yml:ro
      - slot_invalidation_mammoth_data:/app/.sqlite3
    depends_on:
      postgres:
        condition: service_healthy
      webhook_receiver:
        condition: service_started

  producer_before_invalidation:
    image: postgres:17
    profiles: ["producer"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: mammoth
    volumes:
      - ./producer/before_invalidation.sql:/producer/before_invalidation.sql:ro
    command:
      - sh
      - -c
      - |
        psql -h postgres -U mammoth -d mammoth_demo -v ON_ERROR_STOP=1 -f /producer/before_invalidation.sql

  producer_after_recovery:
    image: postgres:17
    profiles: ["producer"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: mammoth
    volumes:
      - ./producer/after_recovery.sql:/producer/after_recovery.sql:ro
    command:
      - sh
      - -c
      - |
        psql -h postgres -U mammoth -d mammoth_demo -v ON_ERROR_STOP=1 -f /producer/after_recovery.sql

  wal_churn:
    image: postgres:17
    profiles: ["producer"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: mammoth
    volumes:
      - ./producer/wal_churn.sql:/producer/wal_churn.sql:ro
    command:
      - sh
      - -c
      - |
        psql -h postgres -U mammoth -d mammoth_demo -v ON_ERROR_STOP=1 -f /producer/wal_churn.sql

  operator_reconcile:
    image: postgres:17
    profiles: ["operator"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: mammoth
    volumes:
      - slot_invalidation_mammoth_data:/app/.sqlite3
    command:
      - sh
      - -c
      - |
        psql -h postgres -U mammoth -d mammoth_demo -v ON_ERROR_STOP=1 -c "SELECT pg_drop_replication_slot('mammoth_slot_invalidation_recovery');"
        rm -f /app/.sqlite3/mammoth.db

volumes:
  slot_invalidation_postgres_data:
  slot_invalidation_mammoth_data:
  slot_invalidation_receiver_data:
