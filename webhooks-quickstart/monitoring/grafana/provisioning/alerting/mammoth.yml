apiVersion: 1

groups:
  - orgId: 1
    name: Mammoth Quickstart
    folder: Mammoth
    interval: 10s
    rules:
      - uid: mammoth-slot-not-ready
        title: Mammoth replication slot not ready
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: mammoth-prometheus
            model:
              datasource:
                type: prometheus
                uid: mammoth-prometheus
              editorMode: code
              expr: mammoth_postgres_slot_ready
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions: []
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 30s
        annotations:
          description: The configured PostgreSQL slot is not safe and active for Mammoth.
          summary: Mammoth replication slot is not ready
        labels:
          severity: critical
          showcase: webhooks-quickstart
        isPaused: false

      - uid: mammoth-wal-budget-pressure
        title: Mammoth WAL budget pressure
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: mammoth-prometheus
            model:
              datasource:
                type: prometheus
                uid: mammoth-prometheus
              editorMode: code
              expr: mammoth_quickstart:wal_budget_used_ratio
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions: []
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.75]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          description: More than 75% of the configured slot WAL retention budget is in use.
          summary: Mammoth replication slot is consuming its WAL budget
        labels:
          severity: warning
          showcase: webhooks-quickstart
        isPaused: false

      - uid: mammoth-pending-dead-letters
        title: Mammoth pending dead letters
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: mammoth-prometheus
            model:
              datasource:
                type: prometheus
                uid: mammoth-prometheus
              editorMode: code
              expr: mammoth_dead_letters_pending_total{destination=""}
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions: []
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          description: One or more failed deliveries require operator inspection.
          summary: Mammoth has pending dead letters
        labels:
          severity: warning
          showcase: webhooks-quickstart
        isPaused: false
