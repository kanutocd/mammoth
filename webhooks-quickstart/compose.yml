name: mammoth-database-webhooks

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mammoth_demo
      POSTGRES_USER: mammoth
      POSTGRES_PASSWORD: mammoth
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
      - -c
      - wal_sender_timeout=30s
      - -c
      - max_slot_wal_keep_size=${POSTGRES_MAX_SLOT_WAL_KEEP_SIZE:-1GB}
    ports:
      - "54331:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mammoth -d mammoth_demo"]
      interval: 2s
      timeout: 3s
      retries: 30

  postgres-setup:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: mammoth
    command:
      - psql
      - -h
      - postgres
      - -U
      - mammoth
      - -d
      - mammoth_demo
      - -v
      - ON_ERROR_STOP=1
      - -f
      - /setup/init.sql
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./postgres/init.sql:/setup/init.sql:ro
    restart: "no"

  event-console:
    build: ./event_console
    environment:
      PORT: "4000"
      DATA_DIR: /data
      WEBHOOK_AUTHORIZATION: "Bearer mammoth-quickstart"
      WEBHOOK_SIGNING_SECRET: "mammoth-quickstart-signing-secret"
    ports:
      - "4000:4000"
    volumes:
      - ./data/events:/data
    healthcheck:
      test: ["CMD", "ruby", "-rnet/http", "-e", "exit(Net::HTTP.get_response(URI('http://localhost:4000/health')).is_a?(Net::HTTPSuccess) ? 0 : 1)"]
      interval: 3s
      timeout: 3s
      retries: 20

  demo-app:
    build: ./demo_app
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://mammoth:mammoth@postgres:5432/mammoth_demo
    ports:
      - "3000:3000"
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "ruby", "-rnet/http", "-e", "exit(Net::HTTP.get_response(URI('http://localhost:3000/health')).is_a?(Net::HTTPSuccess) ? 0 : 1)"]
      interval: 3s
      timeout: 3s
      retries: 20

  mammoth-init:
    image: ${MAMMOTH_IMAGE:-ghcr.io/kanutocd/mammoth:v1.4.0}
    environment:
      MAMMOTH_POSTGRES_PASSWORD: mammoth
      MAMMOTH_WEBHOOK_AUTHORIZATION: "Bearer mammoth-quickstart"
      MAMMOTH_WEBHOOK_SIGNING_SECRET: "mammoth-quickstart-signing-secret"
    command: ["sh", "-c", "mammoth validate /config/mammoth.yml && mammoth bootstrap /config/mammoth.yml"]
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
      event-console:
        condition: service_healthy
    volumes:
      - ./mammoth/mammoth.yml:/config/mammoth.yml:ro
      - mammoth-data:/app/.sqlite3
    restart: "no"

  mammoth:
    image: ${MAMMOTH_IMAGE:-ghcr.io/kanutocd/mammoth:v1.4.0}
    environment:
      MAMMOTH_POSTGRES_PASSWORD: mammoth
      MAMMOTH_WEBHOOK_AUTHORIZATION: "Bearer mammoth-quickstart"
      MAMMOTH_WEBHOOK_SIGNING_SECRET: "mammoth-quickstart-signing-secret"
    command: ["start", "/config/mammoth.yml"]
    depends_on:
      mammoth-init:
        condition: service_completed_successfully
    volumes:
      - ./mammoth/mammoth.yml:/config/mammoth.yml:ro
      - mammoth-data:/app/.sqlite3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mammoth", "status", "/config/mammoth.yml"]
      interval: 5s
      timeout: 5s
      retries: 20

  mammoth-observability:
    image: ${MAMMOTH_IMAGE:-ghcr.io/kanutocd/mammoth:v1.4.0}
    environment:
      MAMMOTH_POSTGRES_PASSWORD: mammoth
      MAMMOTH_WEBHOOK_AUTHORIZATION: "Bearer mammoth-quickstart"
      MAMMOTH_WEBHOOK_SIGNING_SECRET: "mammoth-quickstart-signing-secret"
    command: ["observability", "/config/mammoth.yml"]
    depends_on:
      mammoth-init:
        condition: service_completed_successfully
    ports:
      - "9393:9393"
    volumes:
      - ./mammoth/mammoth.yml:/config/mammoth.yml:ro
      - mammoth-data:/app/.sqlite3
    healthcheck:
      test: ["CMD", "ruby", "-rnet/http", "-e", "exit(Net::HTTP.get_response(URI('http://localhost:9393/healthz')).is_a?(Net::HTTPSuccess) ? 0 : 1)"]
      interval: 5s
      timeout: 5s
      retries: 20

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.13.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=2d
      - --web.console.templates=/etc/prometheus/consoles
    depends_on:
      mammoth-observability:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yml:/etc/prometheus/rules/mammoth.yml:ro
      - ./monitoring/prometheus-consoles:/etc/prometheus/consoles:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 3s
      timeout: 3s
      retries: 20

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:13.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: mammoth
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/mammoth-quickstart.json
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: "false"
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./monitoring/grafana/provisioning/dashboards/mammoth.yml:/etc/grafana/provisioning/dashboards/mammoth.yml:ro
      - ./monitoring/grafana/provisioning/alerting/mammoth.yml:/etc/grafana/provisioning/alerting/mammoth.yml:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 3s
      timeout: 3s
      retries: 30

  monitoring-seed:
    profiles: ["monitoring"]
    build: ./demo_app
    environment:
      DEMO_APP_URL: http://demo-app:3000
      SEED_INTERVAL_SECONDS: ${MONITORING_SEED_INTERVAL_SECONDS:-4}
    command: ["ruby", "/scripts/seed_monitoring.rb"]
    depends_on:
      demo-app:
        condition: service_healthy
      mammoth:
        condition: service_healthy
      grafana:
        condition: service_healthy
    volumes:
      - ./scripts/seed_monitoring.rb:/scripts/seed_monitoring.rb:ro
    restart: "no"

volumes:
  postgres-data:
  mammoth-data:
  prometheus-data:
  grafana-data:
